<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Break Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🕐 Break Tracker</h1>
            <p class="subtitle">Create your account</p>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="john@company.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Min 6 characters" minlength="6">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role">
                        <option value="employee">Employee</option>
                        <option value="manager">Manager</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="department">
                        <option value="Engineering">Engineering</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Sales">Sales</option>
                        <option value="HR">HR</option>
                        <option value="Finance">Finance</option>
                    </select>
                </div>
                <div id="errorMsg" class="error"></div>
                <button type="submit" class="btn-primary btn-block" id="signupBtn">Create Account</button>
            </form>
            
            <p class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION
        // ============================================
        const SUPABASE_URL = 'https://bdufvingtwdpzzwllrc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWZ2dW5ndHdkcHp6d2lpbHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMTEyMjQsImV4cCI6MjA5ODc4NzIyNH0.Wr9KqZFk2SD6d2yA89qp-grJX4lNvJQg8estmVrfrdI';

        // ============================================
        // SIGNUP FUNCTION
        // ============================================
        async function signUp(email, password, userData) {
            try {
                // Step 1: Create auth user using Supabase REST API
                const response = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        data: {
                            name: userData.name,
                            role: userData.role || 'employee'
                        }
                    })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.message || 'Signup failed');
                }

                if (!data.user) {
                    throw new Error('No user data returned');
                }

                // Step 2: Create user profile in users table
                const profileResponse = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({
                        id: data.user.id,
                        email: email,
                        name: userData.name,
                        role: userData.role || 'employee',
                        department: userData.department || 'Engineering'
                    })
                });

                if (!profileResponse.ok) {
                    console.warn('Profile creation warning:', await profileResponse.text());
                }

                return { success: true, user: data.user };

            } catch (error) {
                console.error('Signup error:', error);
                return { success: false, error: error.message };
            }
        }

        // ============================================
        // FORM HANDLER
        // ============================================
        const form = document.getElementById('signupForm');
        const errorMsg = document.getElementById('errorMsg');
        const signupBtn = document.getElementById('signupBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const department = document.getElementById('department').value;
            
            errorMsg.textContent = '';
            errorMsg.style.display = 'none';
            signupBtn.textContent = 'Creating account...';
            signupBtn.disabled = true;
            
            try {
                const result = await signUp(email, password, { name, role, department });
                
                if (result.success) {
                    alert('✅ Account created successfully! Please login.');
                    window.location.href = 'login.html';
                } else {
                    throw new Error(result.error);
                }
            } catch (error) {
                console.error('Signup error:', error);
                errorMsg.textContent = '❌ ' + error.message;
                errorMsg.style.display = 'block';
                signupBtn.textContent = 'Create Account';
                signupBtn.disabled = false;
            }
        });

        console.log('✅ Signup page loaded');
        console.log('🔗 Supabase URL:', SUPABASE_URL);
    </script>
</body>
</html>
