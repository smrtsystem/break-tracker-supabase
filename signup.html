<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Break Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🕐 Break Tracker</h1>
            <p class="subtitle">Create your account</p>
            
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="john@company.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="Min 6 characters" minlength="6">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role">
                        <option value="employee">Employee</option>
                        <option value="manager">Manager</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="department">
                        <option value="Engineering">Engineering</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Sales">Sales</option>
                        <option value="HR">HR</option>
                        <option value="Finance">Finance</option>
                    </select>
                </div>
                <div id="errorMsg" class="error"></div>
                <button type="submit" class="btn-primary btn-block" id="signupBtn">Create Account</button>
            </form>
            
            <p class="auth-footer">
                Already have an account? <a href="login.html">Login</a>
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // SIGNUP WITH LOCAL STORAGE (FIXED)
        // ============================================
        const form = document.getElementById('signupForm');
        const errorMsg = document.getElementById('errorMsg');
        const signupBtn = document.getElementById('signupBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const department = document.getElementById('department').value;
            
            errorMsg.textContent = '';
            errorMsg.style.display = 'none';
            signupBtn.textContent = 'Creating account...';
            signupBtn.disabled = true;
            
            try {
                // Check if user already exists in local storage
                const users = JSON.parse(localStorage.getItem('appUsers') || '[]');
                
                // Check for duplicate email
                if (users.find(u => u.email === email)) {
                    throw new Error('User already exists with this email!');
                }
                
                // Create new user
                const newUser = {
                    id: Date.now().toString(),
                    name: name,
                    email: email,
                    password: password,
                    role: role,
                    department: department,
                    created_at: new Date().toISOString()
                };
                
                // Save to local storage
                users.push(newUser);
                localStorage.setItem('appUsers', JSON.stringify(users));
                
                // Also save as current user
                localStorage.setItem('currentUser', JSON.stringify(newUser));
                
                // Show success
                alert('✅ Account created successfully!\n\nEmail: ' + email + '\nPassword: ' + password + '\n\nPlease login.');
                
                // Redirect to login
                window.location.href = 'login.html';
                
            } catch (error) {
                console.error('Signup error:', error);
                errorMsg.textContent = '❌ ' + error.message;
                errorMsg.style.display = 'block';
                signupBtn.textContent = 'Create Account';
                signupBtn.disabled = false;
            }
        });

        console.log('✅ Signup page loaded - Local Storage mode');
    </script>
</body>
</html>
