<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Break Tracker</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1><span class="icon">🕐</span> Break Tracker</h1>
            <p class="subtitle">Sign in to continue to your dashboard</p>
            
            <div id="successMsg" class="success-msg">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Login successful! Redirecting...</span>
            </div>
            <div id="errorMsg" class="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Login</span>
                    <span class="spinner"></span>
                </button>
            </form>
            
            <div class="divider">or</div>
            
            <p class="auth-footer">
                <a href="admin-login.html"><i class="fas fa-user-shield"></i> Admin Login</a>
            </p>
            <p class="small-text">
                <i class="fas fa-info-circle"></i> Only whitelisted emails can login. Contact admin for access.
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // HARDCODED WHITELIST - Edit this array to add emails
        // These are the DEFAULT emails that come with the system
        // ============================================
        const DEFAULT_HARDCODED_WHITELIST = [
            {
                id: 'wl_hard_1',
                email: 'admin@break-tracker.com',
                name: 'Admin',
                department: 'Administration',
                employeeType: 'Local',
                status: 'active',
                password: '535680',
                addedDate: new Date().toISOString()
            },
            {
                id: 'wl_hard_2',
                email: 'employee@company.com',
                name: 'John Doe',
                department: 'Engineering',
                employeeType: 'Local',
                status: 'active',
                password: '123456',
                addedDate: new Date().toISOString()
            },
            {
                id: 'wl_hard_3',
                email: 'jane@company.com',
                name: 'Jane Smith',
                department: 'Marketing',
                employeeType: 'Expat',
                status: 'active',
                password: '123456',
                addedDate: new Date().toISOString()
            },
            {
                id: 'wl_hard_4',
                email: 'skybetrelated@gmail.com',
                name: 'Acharya',
                department: 'IT',
                employeeType: 'Expat',
                status: 'active',
                password: '123456',
                addedDate: new Date().toISOString()
            },
            {
                id: 'wl_hard_5',
                email: 'chandan@betrelated.com',
                name: 'Chandan',
                department: 'Operations',
                employeeType: 'Expat',
                status: 'active',
                password: '123456',
                addedDate: new Date().toISOString()
            }
        ];

        // ============================================
        // COMPLETE WHITELIST FUNCTIONS
        // ============================================
        
        function getHardcodedWhitelist() {
            try {
                // First try to get from localStorage (web-added hardcoded emails)
                let storedData = localStorage.getItem('hardcodedWhitelist');
                let storedList = [];
                
                if (storedData) {
                    try {
                        storedList = JSON.parse(storedData);
                        console.log('📋 Loaded stored hardcoded whitelist:', storedList.length, 'entries');
                    } catch (e) {
                        console.error('Error parsing stored hardcoded whitelist:', e);
                    }
                }
                
                // Merge default + stored hardcoded
                // Stored takes priority (can override defaults)
                const merged = [...DEFAULT_HARDCODED_WHITELIST];
                
                // Add stored items that don't exist in default
                storedList.forEach(stored => {
                    const exists = merged.some(m => m.email.toLowerCase() === stored.email.toLowerCase());
                    if (!exists) {
                        merged.push(stored);
                    }
                });
                
                return merged;
            } catch (e) {
                console.error('Error reading hardcoded whitelist:', e);
                return DEFAULT_HARDCODED_WHITELIST;
            }
        }

        function getStoredWhitelist() {
            try {
                let data = localStorage.getItem('emailWhitelist');
                if (!data) return [];
                return JSON.parse(data);
            } catch (e) {
                console.error('Error reading stored whitelist:', e);
                return [];
            }
        }

        function getWhitelist() {
            // Merge hardcoded + stored whitelist
            const hardcoded = getHardcodedWhitelist();
            const stored = getStoredWhitelist();
            
            // Start with hardcoded
            const merged = [...hardcoded];
            
            // Add stored items that don't exist in hardcoded
            stored.forEach(item => {
                const exists = merged.some(m => m.email.toLowerCase() === item.email.toLowerCase());
                if (!exists) {
                    merged.push(item);
                }
            });
            
            console.log('📋 Total whitelist:', merged.length, 'entries (Hardcoded:', hardcoded.length, '+ Stored:', stored.length, ')');
            return merged;
        }

        function isEmailWhitelisted(email) {
            if (!email) return false;
            const whitelist = getWhitelist();
            const emailLower = email.toLowerCase().trim();
            
            console.log('🔍 Checking whitelist for:', emailLower);
            
            const result = whitelist.some(item => {
                const itemEmail = (item.email || '').toLowerCase().trim();
                const isActive = item.status === 'active';
                const match = itemEmail === emailLower && isActive;
                if (match) {
                    console.log('✅ Found match:', item);
                }
                return match;
            });
            
            console.log('📊 Is whitelisted?', result);
            return result;
        }

        function getWhitelistedUser(email) {
            if (!email) return null;
            const whitelist = getWhitelist();
            const emailLower = email.toLowerCase().trim();
            return whitelist.find(item => {
                const itemEmail = (item.email || '').toLowerCase().trim();
                return itemEmail === emailLower && item.status === 'active';
            });
        }

        // ============================================
        // CHECK SESSION
        // ============================================
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                if (user && user.email) {
                    if (isEmailWhitelisted(user.email)) {
                        window.location.href = 'index.html';
                    } else {
                        localStorage.removeItem('currentUser');
                    }
                }
            } catch(e) {
                localStorage.removeItem('currentUser');
            }
        }

        // ============================================
        // INITIALIZE - Ensure all whitelists exist
        // ============================================
        function initializeWhitelist() {
            // Ensure hardcoded whitelist exists in localStorage
            let hardcodedData = localStorage.getItem('hardcodedWhitelist');
            if (!hardcodedData) {
                // Save default hardcoded to localStorage
                localStorage.setItem('hardcodedWhitelist', JSON.stringify(DEFAULT_HARDCODED_WHITELIST));
                console.log('✅ Default hardcoded whitelist saved to localStorage');
            }
            
            // Get all whitelist
            const whitelist = getWhitelist();
            
            // Sync with appUsers
            syncWhitelistWithUsers(whitelist);
            
            console.log('✅ Whitelist initialized with', whitelist.length, 'total entries');
        }

        function syncWhitelistWithUsers(whitelist) {
            try {
                const users = JSON.parse(localStorage.getItem('appUsers') || '[]');
                const activeWhitelist = whitelist.filter(w => w.status === 'active');
                
                activeWhitelist.forEach(w => {
                    const existingIndex = users.findIndex(u => u.email.toLowerCase() === w.email.toLowerCase());
                    if (existingIndex === -1) {
                        users.push({
                            id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            name: w.name || w.email.split('@')[0],
                            email: w.email,
                            password: w.password || '123456',
                            role: w.email === 'admin@break-tracker.com' ? 'admin' : 'employee',
                            department: w.department || 'Engineering',
                            employeeType: w.employeeType || 'Local',
                            created_at: new Date().toISOString(),
                            whitelisted: true,
                            isHardcoded: w.isHardcoded || false
                        });
                    } else {
                        users[existingIndex].whitelisted = true;
                        users[existingIndex].name = w.name || users[existingIndex].name;
                        users[existingIndex].department = w.department || users[existingIndex].department;
                        users[existingIndex].employeeType = w.employeeType || users[existingIndex].employeeType;
                    }
                });
                
                localStorage.setItem('appUsers', JSON.stringify(users));
                console.log('✅ Synced whitelist with users');
            } catch (e) {
                console.error('Error syncing whitelist:', e);
            }
        }

        initializeWhitelist();

        // ============================================
        // FORM SUBMIT
        // ============================================
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            
            hideMessages();
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            try {
                if (!email || !password) {
                    throw new Error('Please enter both email and password.');
                }

                console.log('🔑 Login attempt for:', email);

                // ============================================
                // STEP 1: CHECK WHITELIST
                // ============================================
                const whitelist = getWhitelist();
                console.log('📋 Full whitelist:', whitelist);
                
                const whitelistEntry = whitelist.find(w => 
                    w.email.toLowerCase() === email.toLowerCase()
                );
                
                if (!whitelistEntry) {
                    console.log('❌ Email not found in whitelist');
                    throw new Error('❌ This email is not whitelisted. Please contact your administrator.');
                }
                
                if (whitelistEntry.status !== 'active') {
                    console.log('❌ Email is inactive in whitelist');
                    throw new Error('❌ This email is inactive. Please contact your administrator.');
                }
                
                console.log('✅ Email found in whitelist:', whitelistEntry);

                // ============================================
                // STEP 2: CHECK USER CREDENTIALS
                // ============================================
                let users = JSON.parse(localStorage.getItem('appUsers') || '[]');
                
                let foundUser = users.find(u => 
                    u.email.toLowerCase() === email.toLowerCase()
                );

                if (!foundUser) {
                    console.log('🆕 User not found, creating from whitelist...');
                    const newUser = {
                        id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                        name: whitelistEntry.name || email.split('@')[0],
                        email: email,
                        password: whitelistEntry.password || '123456',
                        role: email === 'admin@break-tracker.com' ? 'admin' : 'employee',
                        department: whitelistEntry.department || 'Engineering',
                        employeeType: whitelistEntry.employeeType || 'Local',
                        created_at: new Date().toISOString(),
                        whitelisted: true,
                        isHardcoded: whitelistEntry.isHardcoded || false
                    };
                    users.push(newUser);
                    localStorage.setItem('appUsers', JSON.stringify(users));
                    foundUser = newUser;
                    console.log('✅ User created from whitelist:', email);
                }

                if (foundUser.password !== password) {
                    console.log('❌ Password mismatch');
                    throw new Error('❌ Invalid password. Please try again.');
                }

                // ============================================
                // STEP 3: CREATE SESSION
                // ============================================
                const userSession = {
                    id: foundUser.id,
                    email: foundUser.email,
                    name: foundUser.name || 'User',
                    role: foundUser.role || 'employee',
                    department: foundUser.department || 'Engineering',
                    employeeType: foundUser.employeeType || 'Local',
                    whitelisted: true
                };
                localStorage.setItem('currentUser', JSON.stringify(userSession));
                
                // Update last login in whitelist
                const updatedWhitelist = getWhitelist();
                const wlIndex = updatedWhitelist.findIndex(w => w.email.toLowerCase() === email.toLowerCase());
                if (wlIndex !== -1) {
                    updatedWhitelist[wlIndex].lastLogin = new Date().toISOString();
                    // Save back to appropriate storage
                    if (updatedWhitelist[wlIndex].isHardcoded) {
                        // Update hardcoded list
                        const hardcoded = getHardcodedWhitelist();
                        const hcIndex = hardcoded.findIndex(w => w.email.toLowerCase() === email.toLowerCase());
                        if (hcIndex !== -1) {
                            hardcoded[hcIndex].lastLogin = new Date().toISOString();
                            localStorage.setItem('hardcodedWhitelist', JSON.stringify(hardcoded));
                        }
                    } else {
                        // Update stored list
                        const stored = getStoredWhitelist();
                        const sIndex = stored.findIndex(w => w.email.toLowerCase() === email.toLowerCase());
                        if (sIndex !== -1) {
                            stored[sIndex].lastLogin = new Date().toISOString();
                            localStorage.setItem('emailWhitelist', JSON.stringify(stored));
                        }
                    }
                }

                console.log('✅ Login successful:', foundUser.name);
                showSuccess('✅ Login successful! Redirecting...');
                
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 800);
                
            } catch (error) {
                console.error('Login error:', error);
                showError('❌ ' + error.message);
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        // ============================================
        // DEBUG HELP
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            hideMessages();
            const whitelist = getWhitelist();
            console.log('✅ Login page ready with Hardcoded + Stored Whitelist');
            console.log('📧 Current whitelisted emails:');
            whitelist.forEach(w => {
                const source = w.isHardcoded ? '📌 Hardcoded' : '💾 Stored';
                console.log(`   - ${w.email} (${w.status}) - ${w.name || 'No name'} [${source}]`);
            });
            console.log('💡 Total whitelisted: ' + whitelist.length);
            console.log('📝 To add hardcoded emails, use the admin panel or edit DEFAULT_HARDCODED_WHITELIST');
        });

        // ============================================
        // EXPOSE FUNCTIONS FOR CONSOLE DEBUGGING
        // ============================================
        window.__debug = {
            getWhitelist: getWhitelist,
            getHardcodedWhitelist: getHardcodedWhitelist,
            getStoredWhitelist: getStoredWhitelist,
            isEmailWhitelisted: isEmailWhitelisted,
            DEFAULT_HARDCODED_WHITELIST: DEFAULT_HARDCODED_WHITELIST,
            addHardcodedEmail: function(email, name, department, employeeType, password) {
                const hardcoded = getHardcodedWhitelist();
                const emailLower = email.toLowerCase().trim();
                
                if (hardcoded.some(w => w.email.toLowerCase() === emailLower)) {
                    console.log('❌ Email already exists in hardcoded whitelist');
                    return false;
                }
                
                const newEntry = {
                    id: 'hc_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    email: emailLower,
                    name: name || email.split('@')[0],
                    department: department || 'Engineering',
                    employeeType: employeeType || 'Local',
                    status: 'active',
                    password: password || '123456',
                    addedDate: new Date().toISOString(),
                    isHardcoded: true
                };
                
                hardcoded.push(newEntry);
                localStorage.setItem('hardcodedWhitelist', JSON.stringify(hardcoded));
                console.log('✅ Added to hardcoded whitelist:', email);
                return true;
            }
        };
        
        console.log('🛠️ Debug functions available: window.__debug');
        console.log('📝 To add an email: window.__debug.addHardcodedEmail("user@email.com", "User Name", "Department", "Local", "123456")');
    </script>
</body>
</html>
