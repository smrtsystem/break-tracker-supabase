<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Break Tracker</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1><span class="icon">🕐</span> Break Tracker</h1>
            <p class="subtitle">Sign in to continue to your dashboard</p>
            
            <div id="successMsg" class="success-msg">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Login successful! Redirecting...</span>
            </div>
            <div id="errorMsg" class="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" required placeholder="your@email.com" autocomplete="email" value="employee@company.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password" value="123456">
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Login</span>
                    <span class="spinner"></span>
                </button>
            </form>
            
            <div class="divider">or</div>
            
            <p class="auth-footer">
                <a href="admin-login.html"><i class="fas fa-user-shield"></i> Admin Login</a>
            </p>
            <p class="small-text">
                <i class="fas fa-info-circle"></i> Only whitelisted emails can login. Contact admin for access.
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // COMPLETE LOGIN WITH WHITELIST - FIXED
        // ============================================
        
        // Get DOM elements
        var form = document.getElementById('loginForm');
        var emailInput = document.getElementById('email');
        var passwordInput = document.getElementById('password');
        var loginBtn = document.getElementById('loginBtn');
        var errorMsg = document.getElementById('errorMsg');
        var errorText = document.getElementById('errorText');
        var successMsg = document.getElementById('successMsg');
        var successText = document.getElementById('successText');

        // ============================================
        // FUNCTIONS
        // ============================================
        
        function showError(message) {
            errorText.textContent = message;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        function hideMessages() {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        }

        // ============================================
        // WHITELIST FUNCTIONS
        // ============================================
        
        function getHardcodedWhitelist() {
            try {
                var storedData = localStorage.getItem('hardcodedWhitelist');
                if (storedData) {
                    return JSON.parse(storedData);
                }
            } catch (e) {
                console.error('Error reading hardcoded whitelist:', e);
            }
            
            // Default hardcoded whitelist
            var defaultList = [
                {
                    id: 'hc_default_1',
                    email: 'admin@break-tracker.com',
                    name: 'Admin',
                    department: 'Administration',
                    employeeType: 'Local',
                    status: 'active',
                    password: '535680',
                    addedDate: new Date().toISOString(),
                    isHardcoded: true
                },
                {
                    id: 'hc_default_2',
                    email: 'employee@company.com',
                    name: 'John Doe',
                    department: 'Engineering',
                    employeeType: 'Local',
                    status: 'active',
                    password: '123456',
                    addedDate: new Date().toISOString(),
                    isHardcoded: true
                },
                {
                    id: 'hc_default_3',
                    email: 'jane@company.com',
                    name: 'Jane Smith',
                    department: 'Marketing',
                    employeeType: 'Expat',
                    status: 'active',
                    password: '123456',
                    addedDate: new Date().toISOString(),
                    isHardcoded: true
                },
                {
                    id: 'hc_default_4',
                    email: 'skybetrelated@gmail.com',
                    name: 'Acharya',
                    department: 'IT',
                    employeeType: 'Expat',
                    status: 'active',
                    password: '123456',
                    addedDate: new Date().toISOString(),
                    isHardcoded: true
                },
                {
                    id: 'hc_default_5',
                    email: 'chandan@betrelated.com',
                    name: 'Chandan',
                    department: 'Operations',
                    employeeType: 'Expat',
                    status: 'active',
                    password: '123456',
                    addedDate: new Date().toISOString(),
                    isHardcoded: true
                }
            ];
            
            // Save default to localStorage
            localStorage.setItem('hardcodedWhitelist', JSON.stringify(defaultList));
            return defaultList;
        }

        function getStoredWhitelist() {
            try {
                var data = localStorage.getItem('emailWhitelist');
                if (data) {
                    return JSON.parse(data);
                }
            } catch (e) {
                console.error('Error reading stored whitelist:', e);
            }
            return [];
        }

        function getWhitelist() {
            var hardcoded = getHardcodedWhitelist();
            var stored = getStoredWhitelist();
            
            var merged = hardcoded.slice(); // Copy array
            for (var i = 0; i < stored.length; i++) {
                var exists = false;
                for (var j = 0; j < merged.length; j++) {
                    if (merged[j].email.toLowerCase() === stored[i].email.toLowerCase()) {
                        exists = true;
                        break;
                    }
                }
                if (!exists) {
                    merged.push(stored[i]);
                }
            }
            
            return merged;
        }

        function isEmailWhitelisted(email) {
            if (!email) return false;
            var whitelist = getWhitelist();
            var emailLower = email.toLowerCase().trim();
            
            for (var i = 0; i < whitelist.length; i++) {
                var item = whitelist[i];
                var itemEmail = (item.email || '').toLowerCase().trim();
                var isActive = item.status === 'active';
                if (itemEmail === emailLower && isActive) {
                    return true;
                }
            }
            return false;
        }

        function getWhitelistedUser(email) {
            if (!email) return null;
            var whitelist = getWhitelist();
            var emailLower = email.toLowerCase().trim();
            for (var i = 0; i < whitelist.length; i++) {
                var item = whitelist[i];
                var itemEmail = (item.email || '').toLowerCase().trim();
                if (itemEmail === emailLower && item.status === 'active') {
                    return item;
                }
            }
            return null;
        }

        // ============================================
        // CHECK SESSION - FIXED (no return outside function)
        // ============================================
        function checkSession() {
            try {
                var savedUser = localStorage.getItem('currentUser');
                if (savedUser) {
                    var user = JSON.parse(savedUser);
                    if (user && user.email) {
                        if (isEmailWhitelisted(user.email)) {
                            window.location.href = 'index.html';
                            return true;
                        } else {
                            localStorage.removeItem('currentUser');
                        }
                    }
                }
            } catch(e) {
                localStorage.removeItem('currentUser');
            }
            return false;
        }

        // Run session check
        var isLoggedIn = checkSession();
        if (isLoggedIn) {
            // Already redirected
        }

        // ============================================
        // ENSURE DEFAULT DATA
        // ============================================
        function ensureDefaultData() {
            // Ensure hardcoded whitelist exists
            getHardcodedWhitelist();
            
            // Ensure admin exists
            var admins = JSON.parse(localStorage.getItem('adminUsers') || '[]');
            if (admins.length === 0) {
                var defaultAdmin = {
                    id: 'admin_default',
                    name: 'Admin',
                    email: 'admin@break-tracker.com',
                    password: '535680',
                    role: 'admin',
                    created_at: new Date().toISOString()
                };
                admins.push(defaultAdmin);
                localStorage.setItem('adminUsers', JSON.stringify(admins));
                console.log('✅ Default admin created');
            }

            // Ensure employees exist
            var employees = JSON.parse(localStorage.getItem('employees') || '[]');
            if (employees.length === 0) {
                var defaultEmployees = [
                    { id: 'emp_1', name: 'John Doe', email: 'john@company.com', department: 'Engineering', employeeType: 'Local', position: 'Developer', status: 'active' },
                    { id: 'emp_2', name: 'Jane Smith', email: 'jane@company.com', department: 'Marketing', employeeType: 'Expat', position: 'Manager', status: 'active' },
                    { id: 'emp_3', name: 'Acharya', email: 'skybetrelated@gmail.com', department: 'IT', employeeType: 'Expat', position: 'Developer', status: 'active' },
                    { id: 'emp_4', name: 'Chandan', email: 'chandan@betrelated.com', department: 'Operations', employeeType: 'Expat', position: 'Manager', status: 'active' }
                ];
                localStorage.setItem('employees', JSON.stringify(defaultEmployees));
                console.log('✅ Default employees created');
            }

            // Ensure appUsers exist with whitelisted users
            var whitelist = getWhitelist();
            var users = JSON.parse(localStorage.getItem('appUsers') || '[]');
            for (var i = 0; i < whitelist.length; i++) {
                var w = whitelist[i];
                if (w.status === 'active') {
                    var exists = false;
                    for (var j = 0; j < users.length; j++) {
                        if (users[j].email.toLowerCase() === w.email.toLowerCase()) {
                            exists = true;
                            break;
                        }
                    }
                    if (!exists) {
                        users.push({
                            id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            name: w.name || w.email.split('@')[0],
                            email: w.email,
                            password: w.password || '123456',
                            role: w.email === 'admin@break-tracker.com' ? 'admin' : 'employee',
                            department: w.department || 'Engineering',
                            employeeType: w.employeeType || 'Local',
                            created_at: new Date().toISOString(),
                            whitelisted: true,
                            isHardcoded: w.isHardcoded || false
                        });
                    }
                }
            }
            localStorage.setItem('appUsers', JSON.stringify(users));
        }

        ensureDefaultData();

        // ============================================
        // FORM SUBMIT - FIXED
        // ============================================
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            var email = emailInput.value.trim();
            var password = passwordInput.value.trim();
            
            hideMessages();
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            try {
                if (!email || !password) {
                    throw new Error('Please enter both email and password.');
                }

                console.log('🔑 Login attempt for:', email);

                // ============================================
                // STEP 1: CHECK WHITELIST
                // ============================================
                var whitelist = getWhitelist();
                console.log('📋 Whitelist entries:', whitelist.length);
                
                var whitelistEntry = null;
                for (var i = 0; i < whitelist.length; i++) {
                    if (whitelist[i].email.toLowerCase() === email.toLowerCase()) {
                        whitelistEntry = whitelist[i];
                        break;
                    }
                }
                
                if (!whitelistEntry) {
                    console.log('❌ Email not found in whitelist');
                    throw new Error('❌ This email is not whitelisted. Please contact your administrator.');
                }
                
                if (whitelistEntry.status !== 'active') {
                    console.log('❌ Email is inactive');
                    throw new Error('❌ This email is inactive. Please contact your administrator.');
                }
                
                console.log('✅ Email found in whitelist:', whitelistEntry);

                // ============================================
                // STEP 2: CHECK USER CREDENTIALS
                // ============================================
                var users = JSON.parse(localStorage.getItem('appUsers') || '[]');
                
                var foundUser = null;
                for (var j = 0; j < users.length; j++) {
                    if (users[j].email.toLowerCase() === email.toLowerCase()) {
                        foundUser = users[j];
                        break;
                    }
                }

                if (!foundUser) {
                    console.log('🆕 Creating user from whitelist...');
                    var newUser = {
                        id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                        name: whitelistEntry.name || email.split('@')[0],
                        email: email,
                        password: whitelistEntry.password || '123456',
                        role: email === 'admin@break-tracker.com' ? 'admin' : 'employee',
                        department: whitelistEntry.department || 'Engineering',
                        employeeType: whitelistEntry.employeeType || 'Local',
                        created_at: new Date().toISOString(),
                        whitelisted: true,
                        isHardcoded: whitelistEntry.isHardcoded || false
                    };
                    users.push(newUser);
                    localStorage.setItem('appUsers', JSON.stringify(users));
                    foundUser = newUser;
                    console.log('✅ User created:', email);
                }

                if (foundUser.password !== password) {
                    console.log('❌ Password mismatch');
                    throw new Error('❌ Invalid password. Please try again.');
                }

                // ============================================
                // STEP 3: CREATE SESSION
                // ============================================
                var userSession = {
                    id: foundUser.id,
                    email: foundUser.email,
                    name: foundUser.name || 'User',
                    role: foundUser.role || 'employee',
                    department: foundUser.department || 'Engineering',
                    employeeType: foundUser.employeeType || 'Local',
                    whitelisted: true
                };
                
                // Save session
                localStorage.setItem('currentUser', JSON.stringify(userSession));
                console.log('✅ Session created for:', foundUser.name);

                // ============================================
                // STEP 4: REDIRECT
                // ============================================
                showSuccess('✅ Login successful! Redirecting...');
                
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 500);
                
            } catch (error) {
                console.error('Login error:', error);
                showError('❌ ' + error.message);
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        // ============================================
        // DEBUG HELP
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            hideMessages();
            var whitelist = getWhitelist();
            console.log('✅ Login page ready');
            console.log('📧 Whitelisted emails:');
            for (var i = 0; i < whitelist.length; i++) {
                var w = whitelist[i];
                var source = w.isHardcoded ? '📌 Hardcoded' : '💾 Stored';
                console.log('   - ' + w.email + ' (' + w.status + ') [' + source + ']');
            }
        });
    </script>
</body>
</html>
