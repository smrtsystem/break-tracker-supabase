<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Break Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🕐 Break Tracker</h1>
            <p class="subtitle">Sign in to continue</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div id="errorMsg" class="error"></div>
                <button type="submit" class="btn-primary btn-block" id="loginBtn">Login</button>
            </form>
            
            <p class="auth-footer">
                <a href="admin-login.html">🛡️ Admin Login</a>
            </p>
            <p class="auth-footer" style="margin-top:5px;font-size:12px;color:#999;">
                Accounts are created by administrators only
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            errorMsg.textContent = '';
            errorMsg.style.display = 'none';
            loginBtn.textContent = 'Logging in...';
            loginBtn.disabled = true;
            
            try {
                const users = JSON.parse(localStorage.getItem('appUsers') || '[]');
                const admins = JSON.parse(localStorage.getItem('adminUsers') || '[]');
                const allUsers = [...users, ...admins];
                
                const user = allUsers.find(u => u.email === email && u.password === password);
                
                if (!user) {
                    throw new Error('Invalid email or password!');
                }
                
                localStorage.setItem('currentUser', JSON.stringify(user));
                window.location.href = 'index.html';
                
            } catch (error) {
                errorMsg.textContent = '❌ ' + error.message;
                errorMsg.style.display = 'block';
                loginBtn.textContent = 'Login';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
