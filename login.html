<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Break Tracker</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1><span class="icon">🕐</span> Break Tracker</h1>
            <p class="subtitle">Sign in to continue to your dashboard</p>
            
            <div id="successMsg" class="success-msg">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Login successful! Redirecting...</span>
            </div>
            <div id="errorMsg" class="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" required placeholder="your@email.com" autocomplete="email" value="employee@company.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password" value="123456">
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Login</span>
                    <span class="spinner"></span>
                </button>
            </form>
            
            <div class="divider">or</div>
            
            <p class="auth-footer">
                <a href="admin-login.html"><i class="fas fa-user-shield"></i> Admin Login</a>
            </p>
            <p class="small-text">
                <i class="fas fa-info-circle"></i> Default: employee@company.com / 123456
            </p>
        </div>
    </div>

    <script type="module">
        import { supabase, signIn, getCurrentUser } from './supabase.js'
        
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const successMsg = document.getElementById('successMsg');
        const successText = document.getElementById('successText');

        function showError(message) {
            errorText.textContent = message;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        function hideMessages() {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        }

        // Check if already logged in
        const currentUser = await getCurrentUser();
        if (currentUser) {
            window.location.href = 'index.html';
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            
            hideMessages();
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            try {
                if (!email || !password) {
                    throw new Error('Please enter both email and password.');
                }

                // ✅ FIX: Check local users first, then try Supabase
                let userProfile = null;

                // Check local users storage
                const localUsers = JSON.parse(localStorage.getItem('appUsers') || '[]');
                const localUser = localUsers.find(u => u.email === email && u.password === password);
                
                if (localUser) {
                    userProfile = {
                        id: localUser.id || 'user_' + Date.now(),
                        email: localUser.email,
                        name: localUser.name || 'User',
                        role: localUser.role || 'employee',
                        department: localUser.department || 'Engineering',
                        employeeType: localUser.employeeType || 'Local'
                    };
                    localStorage.setItem('currentUser', JSON.stringify(userProfile));
                    console.log('✅ Local user login successful');
                } else {
                    // Try Supabase login
                    const result = await signIn(email, password);
                    
                    if (result.success && result.profile) {
                        userProfile = result.profile;
                        localStorage.setItem('currentUser', JSON.stringify(userProfile));
                        console.log('✅ Supabase user login successful');
                    } else {
                        // Check if default users exist, if not create them
                        const defaultUsers = JSON.parse(localStorage.getItem('appUsers') || '[]');
                        if (defaultUsers.length === 0) {
                            // Create default users
                            const defaults = [
                                { id: 'user_1', name: 'John Doe', email: 'employee@company.com', password: '123456', role: 'employee', department: 'Engineering', employeeType: 'Local' },
                                { id: 'user_2', name: 'Jane Smith', email: 'jane@company.com', password: '123456', role: 'employee', department: 'Marketing', employeeType: 'Expat' }
                            ];
                            localStorage.setItem('appUsers', JSON.stringify(defaults));
                            
                            const found = defaults.find(u => u.email === email && u.password === password);
                            if (found) {
                                userProfile = {
                                    id: found.id,
                                    email: found.email,
                                    name: found.name,
                                    role: found.role,
                                    department: found.department,
                                    employeeType: found.employeeType
                                };
                                localStorage.setItem('currentUser', JSON.stringify(userProfile));
                                console.log('✅ Default user login successful');
                            }
                        }
                    }
                }

                if (!userProfile) {
                    throw new Error('Invalid credentials. Try employee@company.com / 123456');
                }

                showSuccess('✅ Login successful! Redirecting...');
                
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 800);
                
            } catch (error) {
                console.error('Login error:', error);
                showError('❌ ' + error.message);
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            hideMessages();
            console.log('✅ Login page ready - Using Local + Supabase Auth');
        });
    </script>
</body>
</html>
