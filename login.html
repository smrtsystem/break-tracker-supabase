<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Break Tracker</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1><span class="icon">🕐</span> Break Tracker</h1>
            <p class="subtitle">Sign in to continue to your dashboard</p>
            
            <div id="successMsg" class="success-msg">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Login successful! Redirecting...</span>
            </div>
            <div id="errorMsg" class="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" required placeholder="your@email.com" autocomplete="email">
                </div>
                
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Login</span>
                    <span class="spinner"></span>
                </button>
            </form>
            
            <div class="divider">or</div>
            
            <p class="auth-footer">
                <a href="admin-login.html"><i class="fas fa-user-shield"></i> Admin Login</a>
            </p>
            <p class="small-text">
                <i class="fas fa-info-circle"></i> Default: employee@company.com / 123456
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // SIMPLE USER LOGIN - WORKING VERSION
        // ============================================
        
        // Get DOM elements
        var form = document.getElementById('loginForm');
        var emailInput = document.getElementById('email');
        var passwordInput = document.getElementById('password');
        var loginBtn = document.getElementById('loginBtn');
        var errorMsg = document.getElementById('errorMsg');
        var errorText = document.getElementById('errorText');
        var successMsg = document.getElementById('successMsg');
        var successText = document.getElementById('successText');

        // ============================================
        // UTILITY FUNCTIONS
        // ============================================
        
        function showError(message) {
            errorText.textContent = message;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        function hideMessages() {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        }

        function getLocalStorage(key) {
            try {
                var data = localStorage.getItem(key);
                if (data) {
                    return JSON.parse(data);
                }
            } catch (e) {
                console.error('Error reading', key, ':', e);
            }
            return null;
        }

        function setLocalStorage(key, value) {
            try {
                localStorage.setItem(key, JSON.stringify(value));
            } catch (e) {
                console.error('Error saving', key, ':', e);
            }
        }

        // ============================================
        // DEFAULT USERS
        // ============================================
        function getDefaultUsers() {
            return [
                {
                    id: 'user_1',
                    name: 'John Doe',
                    email: 'employee@company.com',
                    password: '123456',
                    role: 'employee',
                    department: 'Engineering',
                    employeeType: 'Local',
                    whitelisted: true
                },
                {
                    id: 'user_2',
                    name: 'Jane Smith',
                    email: 'jane@company.com',
                    password: '123456',
                    role: 'employee',
                    department: 'Marketing',
                    employeeType: 'Expat',
                    whitelisted: true
                },
                {
                    id: 'user_3',
                    name: 'Acharya',
                    email: 'skybetrelated@gmail.com',
                    password: '123456',
                    role: 'employee',
                    department: 'IT',
                    employeeType: 'Expat',
                    whitelisted: true
                },
                {
                    id: 'user_4',
                    name: 'Chandan',
                    email: 'chandan@betrelated.com',
                    password: '123456',
                    role: 'employee',
                    department: 'Operations',
                    employeeType: 'Expat',
                    whitelisted: true
                }
            ];
        }

        // ============================================
        // CHECK SESSION
        // ============================================
        function checkUserSession() {
            try {
                var currentUser = getLocalStorage('currentUser');
                if (currentUser && currentUser.email) {
                    window.location.href = 'index.html';
                    return true;
                }
            } catch(e) {
                localStorage.removeItem('currentUser');
            }
            return false;
        }

        // Run session check
        checkUserSession();

        // ============================================
        // ENSURE DEFAULT USERS EXIST
        // ============================================
        function ensureDefaultUsers() {
            var users = getLocalStorage('appUsers');
            if (!users || users.length === 0) {
                setLocalStorage('appUsers', getDefaultUsers());
                console.log('✅ Default users created');
            }
        }

        ensureDefaultUsers();

        // ============================================
        // FORM SUBMIT
        // ============================================
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            var email = emailInput.value.trim();
            var password = passwordInput.value.trim();
            
            hideMessages();
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            try {
                if (!email || !password) {
                    throw new Error('Please enter both email and password.');
                }

                console.log('🔑 Login attempt for:', email);

                // Get users from localStorage
                var users = getLocalStorage('appUsers') || [];
                
                // Find user
                var foundUser = null;
                for (var i = 0; i < users.length; i++) {
                    if (users[i].email.toLowerCase() === email.toLowerCase()) {
                        foundUser = users[i];
                        break;
                    }
                }
                
                if (!foundUser) {
                    // Check if this is a whitelisted email but not in appUsers
                    var whitelist = getLocalStorage('emailWhitelist') || [];
                    var whitelistEntry = null;
                    for (var j = 0; j < whitelist.length; j++) {
                        if (whitelist[j].email.toLowerCase() === email.toLowerCase() && whitelist[j].status === 'active') {
                            whitelistEntry = whitelist[j];
                            break;
                        }
                    }
                    
                    if (whitelistEntry) {
                        // Create user from whitelist
                        var newUser = {
                            id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            name: whitelistEntry.name || email.split('@')[0],
                            email: email,
                            password: whitelistEntry.password || '123456',
                            role: 'employee',
                            department: whitelistEntry.department || 'Engineering',
                            employeeType: whitelistEntry.employeeType || 'Local',
                            whitelisted: true
                        };
                        users.push(newUser);
                        setLocalStorage('appUsers', users);
                        foundUser = newUser;
                        console.log('✅ User created from whitelist:', email);
                    } else {
                        // Check if default users exist
                        var defaultUsers = getDefaultUsers();
                        var defaultUser = null;
                        for (var k = 0; k < defaultUsers.length; k++) {
                            if (defaultUsers[k].email.toLowerCase() === email.toLowerCase()) {
                                defaultUser = defaultUsers[k];
                                break;
                            }
                        }
                        
                        if (defaultUser) {
                            // Add default user to appUsers
                            users.push(defaultUser);
                            setLocalStorage('appUsers', users);
                            foundUser = defaultUser;
                            console.log('✅ Default user added:', email);
                        } else {
                            throw new Error('❌ User not found. Please contact administrator.');
                        }
                    }
                }
                
                // Check password
                if (foundUser.password !== password) {
                    console.log('❌ Password mismatch');
                    throw new Error('❌ Invalid password. Please try again.');
                }

                // Create session
                var userSession = {
                    id: foundUser.id,
                    email: foundUser.email,
                    name: foundUser.name || 'User',
                    role: foundUser.role || 'employee',
                    department: foundUser.department || 'Engineering',
                    employeeType: foundUser.employeeType || 'Local',
                    whitelisted: true
                };
                
                setLocalStorage('currentUser', userSession);
                console.log('✅ Session created for:', foundUser.name);

                // Show success and redirect
                showSuccess('✅ Login successful! Redirecting...');
                
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 500);
                
            } catch (error) {
                console.error('Login error:', error);
                showError('❌ ' + error.message);
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        // ============================================
        // PAGE LOAD
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            hideMessages();
            console.log('✅ User Login page ready');
            
            // Pre-fill with test credentials
            if (!emailInput.value) {
                emailInput.value = 'employee@company.com';
                passwordInput.value = '123456';
            }
        });
    </script>
</body>
</html>
