<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Break Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🕐 Break Tracker</h1>
            <p class="subtitle">Sign in to continue</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <div id="errorMsg" class="error"></div>
                <button type="submit" class="btn-primary btn-block" id="loginBtn">Login</button>
            </form>
            
            <p class="auth-footer">
                <a href="admin-login.html">🛡️ Admin Login</a>
            </p>
            <p class="auth-footer" style="margin-top:5px;font-size:12px;color:#999;">
                Accounts are created by administrators only
            </p>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            
            const form = document.getElementById('loginForm');
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            // Cross-browser safe localStorage check
            function getLocalStorage(key) {
                try {
                    return JSON.parse(localStorage.getItem(key) || '[]');
                } catch (e) {
                    return [];
                }
            }

            function setLocalStorage(key, value) {
                try {
                    localStorage.setItem(key, JSON.stringify(value));
                } catch (e) {
                    console.error('Storage error:', e);
                }
            }

            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                
                errorMsg.textContent = '';
                errorMsg.style.display = 'none';
                loginBtn.textContent = 'Logging in...';
                loginBtn.disabled = true;
                
                try {
                    const users = getLocalStorage('appUsers');
                    const admins = getLocalStorage('adminUsers');
                    const allUsers = [...users, ...admins];
                    
                    const user = allUsers.find(function(u) {
                        return u.email === email && u.password === password;
                    });
                    
                    if (!user) {
                        throw new Error('Invalid email or password!');
                    }
                    
                    setLocalStorage('currentUser', user);
                    window.location.href = 'index.html';
                    
                } catch (error) {
                    errorMsg.textContent = '❌ ' + error.message;
                    errorMsg.style.display = 'block';
                    loginBtn.textContent = 'Login';
                    loginBtn.disabled = false;
                }
            });
        })();
    </script>
</body>
</html>
