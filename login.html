<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Break Tracker</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1><span class="icon">🕐</span> Break Tracker</h1>
            <p class="subtitle">Sign in to continue to your dashboard</p>
            
            <div id="successMsg" class="success-msg">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Login successful! Redirecting...</span>
            </div>
            <div id="errorMsg" class="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" required placeholder="your@email.com" autocomplete="email" value="employee@company.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password" value="123456">
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Login</span>
                    <span class="spinner"></span>
                </button>
            </form>
            
            <div class="divider">or</div>
            
            <p class="auth-footer">
                <a href="admin-login.html"><i class="fas fa-user-shield"></i> Admin Login</a>
            </p>
            <p class="small-text">
                <i class="fas fa-info-circle"></i> Only whitelisted emails can login. Contact admin for access.
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // USER LOGIN WITH WHITELIST CHECK
        // ============================================
        
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const successMsg = document.getElementById('successMsg');
        const successText = document.getElementById('successText');

        function showError(message) {
            errorText.textContent = message;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        function hideMessages() {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        }

        // ============================================
        // WHITELIST FUNCTIONS
        // ============================================
        function getWhitelist() {
            try {
                return JSON.parse(localStorage.getItem('emailWhitelist') || '[]');
            } catch {
                return [];
            }
        }

        function isEmailWhitelisted(email) {
            const whitelist = getWhitelist();
            return whitelist.some(item => 
                item.email.toLowerCase() === email.toLowerCase() && 
                item.status === 'active'
            );
        }

        function getWhitelistedUser(email) {
            const whitelist = getWhitelist();
            return whitelist.find(item => 
                item.email.toLowerCase() === email.toLowerCase() && 
                item.status === 'active'
            );
        }

        // ============================================
        // CHECK SESSION
        // ============================================
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                if (user && user.email) {
                    window.location.href = 'index.html';
                }
            } catch(e) {
                localStorage.removeItem('currentUser');
            }
        }

        // ============================================
        // ENSURE DEFAULT DATA
        // ============================================
        function ensureDefaultData() {
            // Ensure whitelist exists
            const whitelist = getWhitelist();
            if (whitelist.length === 0) {
                const defaultWhitelist = [
                    { id: 'wl_1', email: 'employee@company.com', name: 'John Doe', department: 'Engineering', employeeType: 'Local', status: 'active', password: '123456', addedDate: new Date().toISOString() },
                    { id: 'wl_2', email: 'jane@company.com', name: 'Jane Smith', department: 'Marketing', employeeType: 'Expat', status: 'active', password: '123456', addedDate: new Date().toISOString() }
                ];
                localStorage.setItem('emailWhitelist', JSON.stringify(defaultWhitelist));
                
                // Also add to appUsers
                const users = JSON.parse(localStorage.getItem('appUsers') || '[]');
                defaultWhitelist.forEach(w => {
                    if (!users.some(u => u.email === w.email)) {
                        users.push({
                            id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            name: w.name,
                            email: w.email,
                            password: '123456',
                            role: 'employee',
                            department: w.department,
                            employeeType: w.employeeType,
                            created_at: new Date().toISOString(),
                            whitelisted: true
                        });
                    }
                });
                localStorage.setItem('appUsers', JSON.stringify(users));
                console.log('✅ Default whitelist created');
            }

            // Ensure admin exists
            const admins = JSON.parse(localStorage.getItem('adminUsers') || '[]');
            if (admins.length === 0) {
                const defaultAdmin = {
                    id: 'admin_default',
                    name: 'Admin',
                    email: 'admin@break-tracker.com',
                    password: '535680',
                    role: 'admin',
                    created_at: new Date().toISOString()
                };
                admins.push(defaultAdmin);
                localStorage.setItem('adminUsers', JSON.stringify(admins));
                console.log('✅ Default admin created');
            }
        }

        ensureDefaultData();

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            
            hideMessages();
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            try {
                if (!email || !password) {
                    throw new Error('Please enter both email and password.');
                }

                // ============================================
                // STEP 1: CHECK WHITELIST
                // ============================================
                if (!isEmailWhitelisted(email)) {
                    throw new Error('❌ This email is not whitelisted. Please contact your administrator.');
                }

                // ============================================
                // STEP 2: CHECK USER CREDENTIALS
                // ============================================
                const whitelistedUser = getWhitelistedUser(email);
                const users = JSON.parse(localStorage.getItem('appUsers') || '[]');
                
                // Find user in appUsers
                let foundUser = users.find(u => 
                    u.email.toLowerCase() === email.toLowerCase() && 
                    u.password === password
                );

                // If not found in appUsers but is whitelisted, create user
                if (!foundUser && whitelistedUser) {
                    const newUser = {
                        id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                        name: whitelistedUser.name || email.split('@')[0],
                        email: email,
                        password: password || '123456',
                        role: 'employee',
                        department: whitelistedUser.department || 'Engineering',
                        employeeType: whitelistedUser.employeeType || 'Local',
                        created_at: new Date().toISOString(),
                        whitelisted: true
                    };
                    users.push(newUser);
                    localStorage.setItem('appUsers', JSON.stringify(users));
                    foundUser = newUser;
                    console.log('✅ User created from whitelist:', email);
                }

                if (!foundUser) {
                    throw new Error('❌ Invalid credentials. Please check your password.');
                }

                // ============================================
                // STEP 3: CREATE SESSION
                // ============================================
                const userSession = {
                    id: foundUser.id,
                    email: foundUser.email,
                    name: foundUser.name || 'User',
                    role: foundUser.role || 'employee',
                    department: foundUser.department || 'Engineering',
                    employeeType: foundUser.employeeType || 'Local',
                    whitelisted: true
                };
                localStorage.setItem('currentUser', JSON.stringify(userSession));
                
                // Update last login in whitelist
                const whitelist = getWhitelist();
                const wlIndex = whitelist.findIndex(w => w.email.toLowerCase() === email.toLowerCase());
                if (wlIndex !== -1) {
                    whitelist[wlIndex].lastLogin = new Date().toISOString();
                    localStorage.setItem('emailWhitelist', JSON.stringify(whitelist));
                }

                console.log('✅ Login successful:', foundUser.name);
                showSuccess('✅ Login successful! Redirecting...');
                
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 800);
                
            } catch (error) {
                console.error('Login error:', error);
                showError('❌ ' + error.message);
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            hideMessages();
            console.log('✅ Login page ready with Whitelist System');
            console.log('📧 Only whitelisted emails can login');
        });
    </script>
</body>
</html>
