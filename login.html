<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Break Tracker</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1><span class="icon">🕐</span> Break Tracker</h1>
            <p class="subtitle">Sign in to continue to your dashboard</p>
            
            <div id="successMsg" class="success-msg">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Login successful! Redirecting...</span>
            </div>
            <div id="errorMsg" class="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" required placeholder="your@email.com" autocomplete="email" value="employee@company.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password" value="123456">
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Login</span>
                    <span class="spinner"></span>
                </button>
            </form>
            
            <div class="divider">or</div>
            
            <p class="auth-footer">
                <a href="admin-login.html"><i class="fas fa-user-shield"></i> Admin Login</a>
            </p>
            <p class="small-text">
                <i class="fas fa-info-circle"></i> Default: employee@company.com / 123456
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // USER LOGIN - FIXED
        // ============================================
        
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const successMsg = document.getElementById('successMsg');
        const successText = document.getElementById('successText');

        function showError(message) {
            errorText.textContent = message;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        function hideMessages() {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        }

        // Check if already logged in
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                if (user && user.email) {
                    window.location.href = 'index.html';
                }
            } catch(e) {
                localStorage.removeItem('currentUser');
            }
        }

        // Ensure default users exist
        function ensureDefaultUsers() {
            const users = JSON.parse(localStorage.getItem('appUsers') || '[]');
            if (users.length === 0) {
                const defaultUsers = [
                    { 
                        id: 'user_1', 
                        name: 'John Doe', 
                        email: 'employee@company.com', 
                        password: '123456', 
                        role: 'employee', 
                        department: 'Engineering', 
                        employeeType: 'Local',
                        created_at: new Date().toISOString()
                    },
                    { 
                        id: 'user_2', 
                        name: 'Jane Smith', 
                        email: 'jane@company.com', 
                        password: '123456', 
                        role: 'employee', 
                        department: 'Marketing', 
                        employeeType: 'Expat',
                        created_at: new Date().toISOString()
                    }
                ];
                localStorage.setItem('appUsers', JSON.stringify(defaultUsers));
                console.log('✅ Default users created');
            }
        }

        // Also ensure admin exists
        function ensureDefaultAdmin() {
            const admins = JSON.parse(localStorage.getItem('adminUsers') || '[]');
            if (admins.length === 0) {
                const defaultAdmin = {
                    id: 'admin_default',
                    name: 'Admin',
                    email: 'admin@break-tracker.com',
                    password: '535680',
                    role: 'admin',
                    created_at: new Date().toISOString()
                };
                admins.push(defaultAdmin);
                localStorage.setItem('adminUsers', JSON.stringify(admins));
                console.log('✅ Default admin created');
            }
        }

        // Call this on page load
        ensureDefaultUsers();
        ensureDefaultAdmin();

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            
            hideMessages();
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            try {
                if (!email || !password) {
                    throw new Error('Please enter both email and password.');
                }

                // ✅ CHECK LOCAL USERS FIRST
                const users = JSON.parse(localStorage.getItem('appUsers') || '[]');
                const foundUser = users.find(u => u.email === email && u.password === password);
                
                if (foundUser) {
                    // Create session
                    const userSession = {
                        id: foundUser.id,
                        email: foundUser.email,
                        name: foundUser.name || 'User',
                        role: foundUser.role || 'employee',
                        department: foundUser.department || 'Engineering',
                        employeeType: foundUser.employeeType || 'Local'
                    };
                    localStorage.setItem('currentUser', JSON.stringify(userSession));
                    console.log('✅ User login successful:', foundUser.name);
                    
                    showSuccess('✅ Login successful! Redirecting...');
                    
                    setTimeout(function() {
                        window.location.href = 'index.html';
                    }, 800);
                } else {
                    // Check if this is a new user, create them
                    const existing = users.find(u => u.email === email);
                    if (!existing) {
                        // Create new user
                        const newUser = {
                            id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            name: email.split('@')[0] || 'User',
                            email: email,
                            password: password,
                            role: 'employee',
                            department: 'Engineering',
                            employeeType: 'Local',
                            created_at: new Date().toISOString()
                        };
                        users.push(newUser);
                        localStorage.setItem('appUsers', JSON.stringify(users));
                        
                        // Auto login
                        const userSession = {
                            id: newUser.id,
                            email: newUser.email,
                            name: newUser.name,
                            role: newUser.role,
                            department: newUser.department,
                            employeeType: newUser.employeeType
                        };
                        localStorage.setItem('currentUser', JSON.stringify(userSession));
                        console.log('✅ New user created and logged in:', newUser.name);
                        
                        showSuccess('✅ Account created! Redirecting...');
                        setTimeout(function() {
                            window.location.href = 'index.html';
                        }, 800);
                    } else {
                        throw new Error('Invalid credentials. Try employee@company.com / 123456');
                    }
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showError('❌ ' + error.message);
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            hideMessages();
            console.log('✅ Login page ready');
        });
    </script>
</body>
</html>
