<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Break Tracker</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1><span class="icon">🕐</span> Break Tracker</h1>
            <p class="subtitle">Sign in to continue to your dashboard</p>
            
            <div id="successMsg" class="success-msg">
                <i class="fas fa-check-circle"></i>
                <span id="successText">Login successful! Redirecting...</span>
            </div>
            <div id="errorMsg" class="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input type="email" id="email" required placeholder="your@email.com" autocomplete="email" value="chandan@betrelated.com">
                </div>
                
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password" value="123456">
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Login</span>
                    <span class="spinner"></span>
                </button>
            </form>
            
            <div class="divider">or</div>
            
            <p class="auth-footer">
                <a href="admin-login.html"><i class="fas fa-user-shield"></i> Admin Login</a>
            </p>
            <p class="small-text">
                <i class="fas fa-info-circle"></i> Only whitelisted emails can login. Contact admin for access.
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // COMPLETE USER LOGIN WITH WHITELIST CHECK - FIXED
        // ============================================
        
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const successMsg = document.getElementById('successMsg');
        const successText = document.getElementById('successText');

        function showError(message) {
            errorText.textContent = message;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
        }

        function hideMessages() {
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
        }

        // ============================================
        // WHITELIST FUNCTIONS - FIXED
        // ============================================
        function getWhitelist() {
            try {
                // Try to get whitelist from localStorage
                let data = localStorage.getItem('emailWhitelist');
                
                // If no whitelist exists, create default
                if (!data) {
                    console.log('⚠️ No whitelist found, creating default...');
                    const defaultWhitelist = [
                        { 
                            id: 'wl_1', 
                            email: 'employee@company.com', 
                            name: 'John Doe', 
                            department: 'Engineering', 
                            employeeType: 'Local', 
                            status: 'active', 
                            password: '123456', 
                            addedDate: new Date().toISOString() 
                        },
                        { 
                            id: 'wl_2', 
                            email: 'jane@company.com', 
                            name: 'Jane Smith', 
                            department: 'Marketing', 
                            employeeType: 'Expat', 
                            status: 'active', 
                            password: '123456', 
                            addedDate: new Date().toISOString() 
                        },
                        { 
                            id: 'wl_3', 
                            email: 'skybetrelated@gmail.com', 
                            name: 'Acharya', 
                            department: 'IT', 
                            employeeType: 'Expat', 
                            status: 'active', 
                            password: '123456', 
                            addedDate: new Date().toISOString() 
                        },
                        { 
                            id: 'wl_4', 
                            email: 'chandan@betrelated.com', 
                            name: 'Chandan', 
                            department: 'Operations', 
                            employeeType: 'Expat', 
                            status: 'active', 
                            password: '123456', 
                            addedDate: new Date().toISOString() 
                        }
                    ];
                    localStorage.setItem('emailWhitelist', JSON.stringify(defaultWhitelist));
                    return defaultWhitelist;
                }
                
                const whitelist = JSON.parse(data);
                console.log('📋 Whitelist loaded:', whitelist.length, 'entries');
                return whitelist;
            } catch (e) {
                console.error('Error reading whitelist:', e);
                return [];
            }
        }

        function saveWhitelist(whitelist) {
            try {
                localStorage.setItem('emailWhitelist', JSON.stringify(whitelist));
                console.log('✅ Whitelist saved:', whitelist.length, 'entries');
                syncWhitelistWithUsers(whitelist);
            } catch (e) {
                console.error('Error saving whitelist:', e);
            }
        }

        function syncWhitelistWithUsers(whitelist) {
            try {
                const users = JSON.parse(localStorage.getItem('appUsers') || '[]');
                const activeWhitelist = whitelist.filter(w => w.status === 'active');
                
                activeWhitelist.forEach(w => {
                    const existingIndex = users.findIndex(u => u.email.toLowerCase() === w.email.toLowerCase());
                    if (existingIndex === -1) {
                        users.push({
                            id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            name: w.name || w.email.split('@')[0],
                            email: w.email,
                            password: w.password || '123456',
                            role: 'employee',
                            department: w.department || 'Engineering',
                            employeeType: w.employeeType || 'Local',
                            created_at: new Date().toISOString(),
                            whitelisted: true
                        });
                    } else {
                        users[existingIndex].whitelisted = true;
                        users[existingIndex].name = w.name || users[existingIndex].name;
                        users[existingIndex].department = w.department || users[existingIndex].department;
                        users[existingIndex].employeeType = w.employeeType || users[existingIndex].employeeType;
                    }
                });
                
                localStorage.setItem('appUsers', JSON.stringify(users));
                console.log('✅ Synced whitelist with users');
            } catch (e) {
                console.error('Error syncing whitelist:', e);
            }
        }

        function isEmailWhitelisted(email) {
            if (!email) return false;
            const whitelist = getWhitelist();
            const emailLower = email.toLowerCase().trim();
            
            console.log('🔍 Checking whitelist for:', emailLower);
            console.log('📋 Current whitelist entries:', whitelist.map(w => ({ 
                email: w.email, 
                status: w.status 
            })));
            
            // Check if email exists and is active
            const result = whitelist.some(item => {
                const itemEmail = (item.email || '').toLowerCase().trim();
                const isActive = item.status === 'active';
                const match = itemEmail === emailLower && isActive;
                if (match) {
                    console.log('✅ Found match:', item);
                }
                return match;
            });
            
            console.log('📊 Is whitelisted?', result);
            return result;
        }

        function getWhitelistedUser(email) {
            if (!email) return null;
            const whitelist = getWhitelist();
            const emailLower = email.toLowerCase().trim();
            return whitelist.find(item => {
                const itemEmail = (item.email || '').toLowerCase().trim();
                return itemEmail === emailLower && item.status === 'active';
            });
        }

        // ============================================
        // CHECK SESSION
        // ============================================
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                if (user && user.email) {
                    if (isEmailWhitelisted(user.email)) {
                        window.location.href = 'index.html';
                    } else {
                        localStorage.removeItem('currentUser');
                    }
                }
            } catch(e) {
                localStorage.removeItem('currentUser');
            }
        }

        // ============================================
        // ENSURE DEFAULT DATA
        // ============================================
        function ensureDefaultData() {
            // Ensure whitelist exists with all emails
            let whitelist = getWhitelist();
            
            // Add chandan@betrelated.com if not in whitelist
            const chandanEmail = 'chandan@betrelated.com';
            if (!whitelist.some(w => w.email.toLowerCase() === chandanEmail.toLowerCase())) {
                whitelist.push({
                    id: 'wl_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    email: chandanEmail,
                    name: 'Chandan',
                    department: 'Operations',
                    employeeType: 'Expat',
                    status: 'active',
                    password: '123456',
                    addedDate: new Date().toISOString()
                });
                localStorage.setItem('emailWhitelist', JSON.stringify(whitelist));
                console.log('✅ Added chandan@betrelated.com to whitelist');
            }

            // Ensure skybetrelated@gmail.com is in whitelist
            const skybetEmail = 'skybetrelated@gmail.com';
            if (!whitelist.some(w => w.email.toLowerCase() === skybetEmail.toLowerCase())) {
                whitelist.push({
                    id: 'wl_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    email: skybetEmail,
                    name: 'Acharya',
                    department: 'IT',
                    employeeType: 'Expat',
                    status: 'active',
                    password: '123456',
                    addedDate: new Date().toISOString()
                });
                localStorage.setItem('emailWhitelist', JSON.stringify(whitelist));
                console.log('✅ Added skybetrelated@gmail.com to whitelist');
            }

            // Sync with users
            syncWhitelistWithUsers(whitelist);

            // Ensure admin exists
            const admins = JSON.parse(localStorage.getItem('adminUsers') || '[]');
            if (admins.length === 0) {
                const defaultAdmin = {
                    id: 'admin_default',
                    name: 'Admin',
                    email: 'admin@break-tracker.com',
                    password: '535680',
                    role: 'admin',
                    created_at: new Date().toISOString()
                };
                admins.push(defaultAdmin);
                localStorage.setItem('adminUsers', JSON.stringify(admins));
                console.log('✅ Default admin created');
            }

            // Ensure employees exist
            const employees = JSON.parse(localStorage.getItem('employees') || '[]');
            if (employees.length === 0) {
                const defaultEmployees = [
                    { id: 'emp_1', name: 'John Doe', email: 'john@company.com', department: 'Engineering', employeeType: 'Local', position: 'Developer', status: 'active' },
                    { id: 'emp_2', name: 'Jane Smith', email: 'jane@company.com', department: 'Marketing', employeeType: 'Expat', position: 'Manager', status: 'active' },
                    { id: 'emp_3', name: 'Acharya', email: 'skybetrelated@gmail.com', department: 'IT', employeeType: 'Expat', position: 'Developer', status: 'active' },
                    { id: 'emp_4', name: 'Chandan', email: 'chandan@betrelated.com', department: 'Operations', employeeType: 'Expat', position: 'Manager', status: 'active' }
                ];
                localStorage.setItem('employees', JSON.stringify(defaultEmployees));
                console.log('✅ Default employees created');
            }
        }

        // Call this immediately
        ensureDefaultData();

        // ============================================
        // FORM SUBMIT
        // ============================================
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            
            hideMessages();
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            try {
                if (!email || !password) {
                    throw new Error('Please enter both email and password.');
                }

                console.log('🔑 Login attempt for:', email);

                // ============================================
                // STEP 1: CHECK WHITELIST - WITH DEBUG
                // ============================================
                const whitelist = getWhitelist();
                console.log('📋 Full whitelist:', whitelist);
                
                // Check if email is in whitelist (case insensitive)
                const whitelistEntry = whitelist.find(w => 
                    w.email.toLowerCase() === email.toLowerCase()
                );
                
                if (!whitelistEntry) {
                    console.log('❌ Email not found in whitelist');
                    throw new Error('❌ This email is not whitelisted. Please contact your administrator.');
                }
                
                if (whitelistEntry.status !== 'active') {
                    console.log('❌ Email is inactive in whitelist');
                    throw new Error('❌ This email is inactive. Please contact your administrator.');
                }
                
                console.log('✅ Email found in whitelist:', whitelistEntry);

                // ============================================
                // STEP 2: CHECK USER CREDENTIALS
                // ============================================
                let users = JSON.parse(localStorage.getItem('appUsers') || '[]');
                
                // Find user in appUsers
                let foundUser = users.find(u => 
                    u.email.toLowerCase() === email.toLowerCase()
                );

                // If not found, create user from whitelist
                if (!foundUser) {
                    console.log('🆕 User not found in appUsers, creating from whitelist...');
                    const newUser = {
                        id: 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                        name: whitelistEntry.name || email.split('@')[0],
                        email: email,
                        password: whitelistEntry.password || '123456',
                        role: 'employee',
                        department: whitelistEntry.department || 'Engineering',
                        employeeType: whitelistEntry.employeeType || 'Local',
                        created_at: new Date().toISOString(),
                        whitelisted: true
                    };
                    users.push(newUser);
                    localStorage.setItem('appUsers', JSON.stringify(users));
                    foundUser = newUser;
                    console.log('✅ User created from whitelist:', email);
                }

                // Check password
                if (foundUser.password !== password) {
                    console.log('❌ Password mismatch');
                    throw new Error('❌ Invalid password. Please try again.');
                }

                // ============================================
                // STEP 3: CREATE SESSION
                // ============================================
                const userSession = {
                    id: foundUser.id,
                    email: foundUser.email,
                    name: foundUser.name || 'User',
                    role: foundUser.role || 'employee',
                    department: foundUser.department || 'Engineering',
                    employeeType: foundUser.employeeType || 'Local',
                    whitelisted: true
                };
                localStorage.setItem('currentUser', JSON.stringify(userSession));
                
                // Update last login in whitelist
                const updatedWhitelist = getWhitelist();
                const wlIndex = updatedWhitelist.findIndex(w => w.email.toLowerCase() === email.toLowerCase());
                if (wlIndex !== -1) {
                    updatedWhitelist[wlIndex].lastLogin = new Date().toISOString();
                    localStorage.setItem('emailWhitelist', JSON.stringify(updatedWhitelist));
                }

                console.log('✅ Login successful:', foundUser.name);
                showSuccess('✅ Login successful! Redirecting...');
                
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 800);
                
            } catch (error) {
                console.error('Login error:', error);
                showError('❌ ' + error.message);
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        // ============================================
        // DEBUG HELP - Show whitelist in console
        // ============================================
        document.addEventListener('DOMContentLoaded', function() {
            hideMessages();
            const whitelist = getWhitelist();
            console.log('✅ Login page ready with Whitelist System');
            console.log('📧 Current whitelisted emails:');
            whitelist.forEach(w => {
                console.log(`   - ${w.email} (${w.status}) - ${w.name || 'No name'}`);
            });
            console.log('💡 Total whitelisted: ' + whitelist.length);
            
            // Pre-fill with test email if none
            if (!emailInput.value) {
                emailInput.value = 'chandan@betrelated.com';
                passwordInput.value = '123456';
            }
        });

        // ============================================
        // EMERGENCY FIX - Run this if login still fails
        // ============================================
        console.log('🛠️ To fix manually, run this in console:');
        console.log(`
            const whitelist = JSON.parse(localStorage.getItem('emailWhitelist') || '[]');
            const email = 'chandan@betrelated.com';
            if (!whitelist.some(w => w.email.toLowerCase() === email.toLowerCase())) {
                whitelist.push({
                    id: 'wl_' + Date.now(),
                    email: email,
                    name: 'Chandan',
                    department: 'Operations',
                    employeeType: 'Expat',
                    status: 'active',
                    password: '123456',
                    addedDate: new Date().toISOString()
                });
                localStorage.setItem('emailWhitelist', JSON.stringify(whitelist));
                console.log('✅ Added', email, 'to whitelist');
            }
            console.log('Whitelist:', JSON.parse(localStorage.getItem('emailWhitelist')));
        `);
    </script>
</body>
</html>
