<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break Tracker - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🕐 Break Tracker</div>
        <div class="nav-right">
            <span id="userDisplay">Welcome!</span>
            <span id="userRole" class="badge" style="background: #667eea;">Employee</span>
            <button id="logoutBtn" class="btn-outline">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Stats Cards - Only Active & Today's Breaks -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>🔴 Active Breaks</h3>
                <p id="activeBreaks">0</p>
            </div>
            <div class="stat-card">
                <h3>📊 Today's Breaks</h3>
                <p id="todayBreaks">0</p>
            </div>
        </div>

        <!-- Active Breaks Wall - Show Who's On Break -->
        <div class="card">
            <h2>🔴 Currently On Break</h2>
            <div id="activeBreaksList">
                <p class="empty">No one is on break right now</p>
            </div>
        </div>

        <!-- Break History (User's Own Breaks) -->
        <div class="card">
            <h2>📊 My Break History</h2>
            <div id="breakHistory">
                <p class="empty">No break history</p>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // USER DASHBOARD - Active Breaks Only
        // ============================================
        
        const currentUser = JSON.parse(localStorage.getItem('currentUser') || 'null');
        
        if (!currentUser) {
            window.location.href = 'login.html';
        }
        
        document.getElementById('userDisplay').textContent = `👋 ${currentUser.name || 'User'}`;
        document.getElementById('userRole').textContent = currentUser.role || 'Employee';
        document.getElementById('userRole').style.background = currentUser.role === 'admin' ? '#ff6b6b' : '#667eea';
        
        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
        document.getElementById('logoutBtn').addEventListener('click', logout);

        // ============================================
        // DATA FUNCTIONS
        // ============================================
        
        function getEmployees() {
            return JSON.parse(localStorage.getItem('employees') || '[]');
        }

        function getBreaks() {
            return JSON.parse(localStorage.getItem('breaks') || '[]');
        }

        function getSettings() {
            return JSON.parse(localStorage.getItem('breakSettings') || '{"maxBreakMinutes":30}');
        }

        function formatDuration(startTime, endTime = null) {
            const start = new Date(startTime);
            const end = endTime ? new Date(endTime) : new Date();
            const diff = Math.floor((end - start) / 1000);
            const mins = Math.floor(diff / 60);
            const secs = diff % 60;
            return `${mins}m ${secs}s`;
        }

        // ============================================
        // LOAD ACTIVE BREAKS (Visible to Everyone)
        // ============================================
        function loadActiveBreaks() {
            const breaks = getBreaks();
            const employees = getEmployees();
            const active = breaks.filter(b => b.status === 'active');
            const list = document.getElementById('activeBreaksList');
            
            document.getElementById('activeBreaks').textContent = active.length;
            
            if (active.length === 0) {
                list.innerHTML = '<p class="empty">✅ No one is on break right now</p>';
                return;
            }
            
            let html = '<div class="break-wall">';
            active.forEach(b => {
                const emp = employees.find(e => e.id === b.employee_id);
                const duration = formatDuration(b.start_time);
                const timeElapsed = Math.floor((new Date() - new Date(b.start_time)) / 60000);
                const settings = getSettings();
                const maxMinutes = settings.maxBreakMinutes || 30;
                const isOverdue = timeElapsed > maxMinutes;
                
                html += `
                    <div class="break-card ${isOverdue ? 'overdue' : ''}">
                        <div class="break-card-header">
                            <div class="employee-avatar">👤</div>
                            <div>
                                <h3>${emp?.name || 'Unknown'}</h3>
                                <span class="badge ${isOverdue ? 'red' : 'green'}">${emp?.department || 'N/A'}</span>
                            </div>
                        </div>
                        <div class="break-card-body">
                            <p>⏱️ Break Time: <strong>${duration}</strong></p>
                            <p>⏰ Started: ${new Date(b.start_time).toLocaleTimeString()}</p>
                            ${isOverdue ? `<p class="overdue-text">⚠️ Overdue! (${timeElapsed}/${maxMinutes} min)</p>` : `<p class="on-time">✅ Within limit (${timeElapsed}/${maxMinutes} min)</p>`}
                        </div>
                    </div>
                `;
            });
            html += '</div>';
            list.innerHTML = html;
        }

        // ============================================
        // LOAD TODAY'S BREAKS
        // ============================================
        function loadTodayBreaks() {
            const breaks = getBreaks();
            const today = new Date().toISOString().split('T')[0];
            const todayBreaks = breaks.filter(b => b.created_at && b.created_at.startsWith(today));
            document.getElementById('todayBreaks').textContent = todayBreaks.length;
        }

        // ============================================
        // LOAD USER'S BREAK HISTORY
        // ============================================
        function loadUserHistory() {
            const breaks = getBreaks();
            const employees = getEmployees();
            
            // Find employee ID for current user
            const emp = employees.find(e => e.email === currentUser.email);
            if (!emp) {
                document.getElementById('breakHistory').innerHTML = '<p class="empty">No breaks found for you</p>';
                return;
            }
            
            const userBreaks = breaks.filter(b => b.employee_id === emp.id && b.status === 'completed').slice(-20).reverse();
            const list = document.getElementById('breakHistory');
            
            if (userBreaks.length === 0) {
                list.innerHTML = '<p class="empty">No break history</p>';
                return;
            }
            
            let html = '<table class="history-table"><thead><tr><th>Start</th><th>Duration</th><th>Status</th></tr></thead><tbody>';
            userBreaks.forEach(b => {
                const duration = b.duration ? formatDuration(b.start_time, b.end_time) : 'In progress';
                html += `
                    <tr>
                        <td>${new Date(b.start_time).toLocaleString()}</td>
                        <td>${duration}</td>
                        <td><span class="badge green">Completed</span></td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            list.innerHTML = html;
        }

        // ============================================
        // AUTO REFRESH
        // ============================================
        function refreshAll() {
            loadActiveBreaks();
            loadTodayBreaks();
            loadUserHistory();
        }

        // Refresh every 10 seconds
        setInterval(refreshAll, 10000);
        
        // Initial load
        refreshAll();
    </script>
</body>
</html>
