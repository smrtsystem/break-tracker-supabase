<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Break Tracker</title>
    <link rel="stylesheet" href="admin-login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div style="text-align: center;">
                <span class="admin-badge"><i class="fas fa-user-shield"></i> ADMIN</span>
            </div>
            
            <h1><span class="icon">🛡️</span> Admin Login</h1>
            <p class="subtitle">Enter your administrator credentials</p>
            
            <div class="security-badge">
                <i class="fas fa-lock"></i>
                <span>Secure Admin Access</span>
                <i class="fas fa-shield-alt" style="color:#667eea;"></i>
            </div>
            
            <div id="errorMsg" class="error-msg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid credentials</span>
            </div>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="email">Admin Email <span class="required">*</span></label>
                    <div class="input-icon">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" required placeholder="admin@break-tracker.com" autocomplete="email" value="admin@break-tracker.com">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Admin Password <span class="required">*</span></label>
                    <div class="input-icon">
                        <i class="fas fa-key"></i>
                        <input type="password" id="password" required placeholder="Enter admin password" autocomplete="current-password" value="535680">
                    </div>
                    <div class="password-hint">
                        <i class="fas fa-info-circle"></i> Default: <strong>535680</strong>
                    </div>
                </div>
                
                <button type="submit" class="btn-primary" id="loginBtn">
                    <span class="btn-text"><i class="fas fa-sign-in-alt"></i> Login as Admin</span>
                    <span class="spinner"></span>
                </button>
            </form>
            
            <div class="divider">or</div>
            
            <p class="auth-footer">
                <a href="login.html"><i class="fas fa-arrow-left"></i> Back to User Login</a>
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // ADMIN LOGIN - COMPLETE
        // ============================================
        
        const form = document.getElementById('adminLoginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        function showError(message) {
            errorText.textContent = message;
            errorMsg.style.display = 'block';
        }

        function hideError() {
            errorMsg.style.display = 'none';
        }

        // Check if already logged in as admin
        const adminSession = localStorage.getItem('adminSession');
        if (adminSession) {
            try {
                const session = JSON.parse(adminSession);
                if (session && session.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                }
            } catch(e) {
                localStorage.removeItem('adminSession');
            }
        }

        // Ensure default admin exists
        function ensureDefaultAdmin() {
            const admins = JSON.parse(localStorage.getItem('adminUsers') || '[]');
            if (admins.length === 0) {
                const defaultAdmin = {
                    id: 'admin_default',
                    name: 'Admin',
                    email: 'admin@break-tracker.com',
                    password: '535680',
                    role: 'admin',
                    created_at: new Date().toISOString()
                };
                admins.push(defaultAdmin);
                localStorage.setItem('adminUsers', JSON.stringify(admins));
                console.log('✅ Default admin created');
            }
        }

        ensureDefaultAdmin();

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            
            hideError();
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            try {
                if (!email || !password) {
                    throw new Error('Please enter both email and password.');
                }

                // Check local admin storage
                const admins = JSON.parse(localStorage.getItem('adminUsers') || '[]');
                const foundAdmin = admins.find(a => 
                    a.email.toLowerCase() === email.toLowerCase() && 
                    a.password === password
                );
                
                if (!foundAdmin) {
                    throw new Error('Invalid admin credentials. Try admin@break-tracker.com / 535680');
                }

                // Create session
                const adminSession = {
                    id: foundAdmin.id,
                    email: foundAdmin.email,
                    name: foundAdmin.name || 'Admin',
                    role: 'admin'
                };
                localStorage.setItem('adminSession', JSON.stringify(adminSession));
                
                console.log('✅ Admin login successful:', foundAdmin.name);
                
                // Redirect
                window.location.href = 'admin-dashboard.html';
                
            } catch (error) {
                console.error('Admin login error:', error);
                showError('❌ ' + error.message);
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            }
        });

        document.addEventListener('DOMContentLoaded', function() {
            hideError();
            console.log('✅ Admin login page ready');
        });
    </script>
</body>
</html>
