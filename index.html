<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-brand">🕐 Break Tracker</div>
        <div class="nav-right">
            <span id="userDisplay">Welcome!</span>
            <button id="logoutBtn" class="btn-outline">Logout</button>
        </div>
    </nav>

    <div class="container">
        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Employees</h3>
                <p id="totalEmployees">0</p>
            </div>
            <div class="stat-card">
                <h3>Active Breaks</h3>
                <p id="activeBreaks">0</p>
            </div>
            <div class="stat-card">
                <h3>Today's Breaks</h3>
                <p id="todayBreaks">0</p>
            </div>
        </div>

        <!-- Active Breaks -->
        <div class="card">
            <h2>🔴 Active Breaks</h2>
            <div id="activeBreaksList">
                <p class="empty">No active breaks</p>
            </div>
        </div>

        <!-- Employees -->
        <div class="card">
            <div class="card-header">
                <h2>👥 Employees</h2>
                <button id="addEmployeeBtn" class="btn-primary">+ Add Employee</button>
            </div>
            <div class="filters">
                <input type="text" id="searchInput" placeholder="Search employees...">
            </div>
            <div id="employeesList"></div>
        </div>

        <!-- Break History -->
        <div class="card">
            <h2>📊 Break History</h2>
            <div id="breakHistory">
                <p class="empty">No breaks recorded</p>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="employeeModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2 id="modalTitle">Add Employee</h2>
            <form id="employeeForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="empName" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="empEmail" required>
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select id="empDepartment">
                        <option value="Engineering">Engineering</option>
                        <option value="Marketing">Marketing</option>
                        <option value="Sales">Sales</option>
                        <option value="HR">HR</option>
                        <option value="Finance">Finance</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Position</label>
                    <input type="text" id="empPosition" placeholder="e.g., Developer">
                </div>
                <button type="submit" class="btn-primary">Save Employee</button>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
