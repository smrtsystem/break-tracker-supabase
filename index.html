<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break Tracker - Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="user-dashboard.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">🕐 Break Tracker</div>
        <div class="nav-right">
            <span id="userDisplay">Welcome!</span>
            <span id="userRole" class="badge" style="background:#667eea;">Employee</span>
            <button id="changePasswordBtn" class="btn-outline" style="padding:6px 12px;font-size:13px;">🔑 Change Password</button>
            <button id="logoutBtn" class="btn-outline">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div class="welcome-header">
            <div>
                <h1>📊 Dashboard</h1>
                <p style="color:#666;font-size:14px;">Live break tracking - Auto refreshes every 10 seconds</p>
            </div>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <span style="font-weight:500;" id="userNameDisplay"></span>
            </div>
        </div>

        <div class="dashboard-wrapper">
            <div class="sidebar">
                <div class="nav-item active" data-view="break-tracker">
                    <span class="icon">⏱️</span>
                    <span>Break Tracker</span>
                </div>
                <div class="nav-item" data-view="vacation">
                    <span class="icon">🏖️</span>
                    <span>Vacation</span>
                </div>
                <div class="nav-item" data-view="checkin">
                    <span class="icon">📋</span>
                    <span>Check In/Out</span>
                </div>
                <div class="sidebar-divider"></div>
                <div class="nav-item" style="opacity:0.5;cursor:default;border-left-color:transparent;">
                    <span class="icon">👤</span>
                    <span style="font-size:12px;color:#999;">Logged in as <span id="sidebarUserName">User</span></span>
                </div>
            </div>

            <div class="main-content">
                <!-- Break Tracker View -->
                <div id="view-break-tracker" class="view-section active">
                    <!-- Your existing break tracker content -->
                </div>

                <!-- Vacation View -->
                <div id="view-vacation" class="view-section">
                    <!-- Your existing vacation content -->
                </div>

                <!-- Check In/Out View -->
                <div id="view-checkin" class="view-section">
                    <!-- Your existing checkin content -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase, getCurrentUser, signOut, getEmployees, getBreaks, getActiveBreaks, getBreakHistory, getStats, subscribeToBreaks, formatDuration } from './supabase.js'
        
        // ============================================
        // CHECK USER SESSION
        // ============================================
        const currentUser = await getCurrentUser();
        if (!currentUser) {
            window.location.href = 'login.html';
        }

        // Set user info
        document.getElementById('userAvatar').textContent = (currentUser.name || 'U').charAt(0).toUpperCase();
        document.getElementById('userNameDisplay').textContent = currentUser.name || 'User';
        document.getElementById('sidebarUserName').textContent = currentUser.name || 'User';
        document.getElementById('userDisplay').textContent = `👋 ${currentUser.name || 'User'}`;
        document.getElementById('userRole').textContent = currentUser.role || 'Employee';
        document.getElementById('userRole').style.background = currentUser.role === 'admin' ? '#ff6b6b' : '#667eea';

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async function() {
            await signOut();
        });

        // ============================================
        // SIDEBAR NAVIGATION
        // ============================================
        document.querySelectorAll('.sidebar .nav-item[data-view]').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('.sidebar .nav-item[data-view]').forEach(i => i.classList.remove('active'));
                this.classList.add('active');

                const view = this.dataset.view;
                document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
                document.getElementById('view-' + view).classList.add('active');

                if (view === 'vacation') {
                    loadVacations('pending');
                } else if (view === 'checkin') {
                    loadCheckinHistory();
                    updateCheckinUI();
                }
            });
        });

        // ============================================
        // LOAD FUNCTIONS
        // ============================================
        async function loadActiveBreaks() {
            try {
                const breaks = await getActiveBreaks();
                const employees = await getEmployees();
                const list = document.getElementById('activeBreaksList');
                
                document.getElementById('activeBreaks').textContent = breaks.length;
                
                if (breaks.length === 0) {
                    list.innerHTML = '<div class="no-breaks"><div class="icon">✅</div><p>No one is on break right now</p></div>';
                    return;
                }
                
                let html = '<div class="break-wall">';
                breaks.forEach(b => {
                    const emp = employees.find(e => e.id === b.employee_id);
                    const duration = formatDuration(b.start_time);
                    const initials = emp?.name ? emp.name.split(' ').map(n => n[0]).join('').toUpperCase() : 'U';
                    const colors = ['#667eea', '#4ecdc4', '#ff6b6b', '#ffd93d', '#a29bfe', '#fd79a8'];
                    const colorIndex = emp?.id ? parseInt(emp.id.slice(-2), 16) % colors.length : 0;
                    const isMe = emp?.email === currentUser.email;
                    
                    html += `<div class="break-card" style="${isMe ? 'border: 2px solid #667eea;' : ''}">
                        <div class="card-header">
                            <div class="avatar" style="background:${colors[colorIndex]};">${initials}</div>
                            <div>
                                <h3>${emp?.name || 'Unknown'} ${isMe ? '👈 (You)' : ''}</h3>
                                <span class="badge badge-green">${emp?.department || 'N/A'}</span>
                            </div>
                        </div>
                        <div class="card-body">
                            <p>⏱️ <strong>${duration}</strong> elapsed</p>
                            <p>⏰ Started at ${new Date(b.start_time).toLocaleTimeString()}</p>
                        </div>
                    </div>`;
                });
                html += '</div>';
                list.innerHTML = html;
                
            } catch (error) {
                console.error('Error loading active breaks:', error);
            }
        }

        // ============================================
        // REFRESH
        // ============================================
        async function refreshAll() {
            await loadActiveBreaks();
        }

        setInterval(refreshAll, 10000);
        refreshAll();

        console.log('✅ User Dashboard loaded - Using Supabase');
        console.log('👤 Logged in as:', currentUser.name, '(', currentUser.email, ')');
    </script>
</body>
</html>
