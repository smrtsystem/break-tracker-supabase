<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Admin - Break Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🔧 Setup Admin Account</h1>
            <p class="subtitle">Create the first admin account</p>
            
            <form id="setupForm">
                <div class="form-group">
                    <label>Admin Name</label>
                    <input type="text" id="name" required placeholder="Admin User" value="Admin User">
                </div>
                <div class="form-group">
                    <label>Admin Email</label>
                    <input type="email" id="email" required placeholder="admin@break-tracker.com" value="admin@break-tracker.com">
                </div>
                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="text" id="password" required value="535680" minlength="6">
                    <small style="color: #666;">Default: 535680</small>
                </div>
                <div id="errorMsg" class="error"></div>
                <button type="submit" class="btn-primary btn-block">Create Admin</button>
            </form>
            
            <p class="auth-footer">
                <a href="admin-login.html">← Back to Admin Login</a>
            </p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://bdufvingtwdpzzwllrc.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWZ2dW5ndHdkcHp6d2lpbHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMTEyMjQsImV4cCI6MjA5ODc4NzIyNH0.Wr9KqZFk2SD6d2yA89qp-grJX4lNvJQg8estmVrfrdI';

        document.getElementById('setupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            errorMsg.textContent = '';
            errorMsg.style.display = 'none';
            
            try {
                // Store admin in localStorage for now
                const admins = JSON.parse(localStorage.getItem('adminUsers') || '[]');
                
                // Check if admin already exists
                if (admins.find(a => a.email === email)) {
                    errorMsg.textContent = '⚠️ Admin already exists!';
                    errorMsg.style.display = 'block';
                    return;
                }
                
                // Add new admin
                admins.push({
                    name: name,
                    email: email,
                    password: password,
                    role: 'admin',
                    created: new Date().toISOString()
                });
                
                localStorage.setItem('adminUsers', JSON.stringify(admins));
                
                alert('✅ Admin account created successfully!\n\nEmail: ' + email + '\nPassword: ' + password);
                window.location.href = 'admin-login.html';
                
            } catch (error) {
                errorMsg.textContent = 'Error: ' + error.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
