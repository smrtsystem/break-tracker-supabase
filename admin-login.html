<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Break Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🛡️ Admin Login</h1>
            <p class="subtitle">Enter admin credentials</p>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Admin Email</label>
                    <input type="email" id="email" required placeholder="admin@break-tracker.com" value="admin@break-tracker.com">
                </div>
                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="password" id="password" required placeholder="Enter admin password" value="535680">
                    <small style="color: #666; display: block; margin-top: 5px;">Default password: <strong>535680</strong></small>
                </div>
                <div id="errorMsg" class="error"></div>
                <button type="submit" class="btn-primary btn-block" id="loginBtn">Login as Admin</button>
            </form>
            
            <p class="auth-footer">
                <a href="setup-admin.html">🔧 Setup Admin</a> | 
                <a href="index.html">← Back to Dashboard</a>
            </p>
        </div>
    </div>

    <script>
        // SIMPLIFIED VERSION - No imports needed!
        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            errorMsg.textContent = '';
            errorMsg.style.display = 'none';
            loginBtn.textContent = 'Logging in...';
            loginBtn.disabled = true;
            
            try {
                // Check if it's the default admin
                if (email === 'admin@break-tracker.com' && password === '535680') {
                    // Store admin session in localStorage
                    localStorage.setItem('adminSession', JSON.stringify({
                        email: email,
                        role: 'admin',
                        loginTime: new Date().toISOString()
                    }));
                    
                    alert('✅ Admin login successful!');
                    window.location.href = 'admin-dashboard.html';
                    return;
                }
                
                // Try Supabase login
                const SUPABASE_URL = 'https://bdufvingtwdpzzwllrc.supabase.co';
                const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkdWZ2dW5ndHdkcHp6d2lpbHJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyMTEyMjQsImV4cCI6MjA5ODc4NzIyNH0.Wr9KqZFk2SD6d2yA89qp-grJX4lNvJQg8estmVrfrdI';
                
                // Check admin password from settings
                const response = await fetch(`${SUPABASE_URL}/rest/v1/admin_settings?setting_key=eq.admin_password&select=setting_value`, {
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                
                if (!response.ok) {
                    // If settings fetch fails, use default password
                    if (password === '535680') {
                        localStorage.setItem('adminSession', JSON.stringify({
                            email: email,
                            role: 'admin',
                            loginTime: new Date().toISOString()
                        }));
                        alert('✅ Admin login successful!');
                        window.location.href = 'admin-dashboard.html';
                        return;
                    }
                    throw new Error('Invalid credentials');
                }
                
                const data = await response.json();
                const adminPassword = data[0]?.setting_value || '535680';
                
                if (password === adminPassword) {
                    localStorage.setItem('adminSession', JSON.stringify({
                        email: email,
                        role: 'admin',
                        loginTime: new Date().toISOString()
                    }));
                    alert('✅ Admin login successful!');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    throw new Error('Invalid password');
                }
                
            } catch (error) {
                console.error('Login error:', error);
                errorMsg.textContent = '❌ ' + error.message;
                errorMsg.style.display = 'block';
                loginBtn.textContent = 'Login as Admin';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
