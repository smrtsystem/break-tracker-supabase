<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Break Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🛡️ Admin Login</h1>
            <p class="subtitle">Enter admin credentials</p>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label>Admin Email</label>
                    <input type="email" id="email" required placeholder="admin@break-tracker.com" value="admin@break-tracker.com">
                </div>
                <div class="form-group">
                    <label>Admin Password</label>
                    <input type="password" id="password" required placeholder="Enter admin password" value="535680">
                    <small style="color: #666; display: block; margin-top: 5px;">Default password: <strong>535680</strong></small>
                </div>
                <div id="errorMsg" class="error"></div>
                <button type="submit" class="btn-primary btn-block" id="loginBtn">Login as Admin</button>
            </form>
            
            <p class="auth-footer">
                <a href="login.html">← Back to User Login</a>
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // ADMIN LOGIN - LOCAL STORAGE
        // ============================================
        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            
            errorMsg.textContent = '';
            errorMsg.style.display = 'none';
            loginBtn.textContent = 'Logging in...';
            loginBtn.disabled = true;
            
            try {
                // Get admin users from local storage
                const admins = JSON.parse(localStorage.getItem('adminUsers') || '[]');
                
                // Check if admin exists
                const admin = admins.find(a => a.email === email && a.password === password);
                
                if (admin) {
                    // Save admin session
                    localStorage.setItem('adminSession', JSON.stringify(admin));
                    alert('✅ Admin login successful!');
                    window.location.href = 'admin-dashboard.html';
                } else {
                    // Check default admin
                    if (email === 'admin@break-tracker.com' && password === '535680') {
                        // Create default admin if not exists
                        const defaultAdmin = {
                            id: Date.now().toString(),
                            name: 'Admin User',
                            email: 'admin@break-tracker.com',
                            password: '535680',
                            role: 'admin',
                            department: 'Management',
                            created_at: new Date().toISOString()
                        };
                        
                        // Save to admin list if not exists
                        if (!admins.find(a => a.email === defaultAdmin.email)) {
                            admins.push(defaultAdmin);
                            localStorage.setItem('adminUsers', JSON.stringify(admins));
                        }
                        
                        localStorage.setItem('adminSession', JSON.stringify(defaultAdmin));
                        alert('✅ Admin login successful!');
                        window.location.href = 'admin-dashboard.html';
                    } else {
                        throw new Error('Invalid admin credentials!');
                    }
                }
            } catch (error) {
                console.error('Admin login error:', error);
                errorMsg.textContent = '❌ ' + error.message;
                errorMsg.style.display = 'block';
                loginBtn.textContent = 'Login as Admin';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
